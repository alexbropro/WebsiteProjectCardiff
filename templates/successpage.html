<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Successful</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
  <style>
    .success-container { max-width: 500px; margin: 4rem auto; text-align: center; padding: 0 1rem; }
    .success-icon { font-size: 3rem; margin-bottom: 1rem; }
    .success-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; }
    .success-msg { color: #888; margin-bottom: 2rem; }
    .success-btn { display: inline-block; background-color: #1d4ed8; color: white; border-radius: 999px; padding: 10px 24px; font-weight: 600; text-decoration: none; }
    .success-btn:hover { background-color: #2563eb; }
  </style>
</head>
<body>
  <header class="hero">
    <div class="container">
      <h1>MangaFF</h1>
      <p>Manga. For the Fans.</p>
    </div>
  </header>
  <nav class="main-nav">
    <div class="nav-container">
      <ul class="nav-links">
        <li><a href="{{ url_for('index') }}">Home</a></li>
        <li><a href="{{ url_for('manga') }}">Manga</a></li>
      </ul>
      <div class="search-form">
        <input type="search" id="search-input" name="q" placeholder="Search the site..." aria-label="Search" autocomplete="off">
        <button type="button">Search</button>
        <div class="search-dropdown" id="search-dropdown"></div>
      </div>
      <a href="{{ url_for('basket') }}" class="basket-link">
        <img src="{{ url_for('static', filename='baslet.png') }}" alt="Basket" class="basket-icon">
      </a>
    </div>
  </nav>
  <div class="success-container">
    <div class="success-icon">✅</div>
    <h1 class="success-title">Order Placed Successfully!</h1>
    <p class="success-msg">Thank you for your order. Your manga is on its way!</p>
    <a href="{{ url_for('manga') }}" class="success-btn">Continue Shopping</a>
  </div>
  <script src="{{ url_for('static', filename='search.js') }}"></script>
</body>
</html>
