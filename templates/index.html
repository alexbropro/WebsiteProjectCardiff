<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homepage</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
</head>
<body>
  <header class="hero">
    <div class="container">
      <h1>MangaFF</h1>
      <p>Manga. For the Fans.</p>
    </div>
  </header>
  <nav class="main-nav">
    <div class="nav-container">
      <ul class="nav-links">
        <li><a href="{{ url_for('index') }}">Home</a></li>
        <li><a href="{{ url_for('manga') }}">Manga</a></li>
      </ul>
      <div class="search-form">
        <input type="search" id="search-input" name="q" placeholder="Search the site..." aria-label="Search" autocomplete="off">
        <button type="button">Search</button>
        <div class="search-dropdown" id="search-dropdown"></div>
      </div>
      <a href="{{ url_for('basket') }}" class="basket-link">
        <img src="{{ url_for('static', filename='baslet.png') }}" alt="Basket" class="basket-icon">
      </a>
    </div>
  </nav>
  <main class="container">
    <section class="intro">
      <h2>Recently Released!</h2>
      <div class="image-boxes">
        {% for item in items %}
        <div class="image-box" data-id="{{ item.id }}">
          <a href="{{ url_for('product', id=item.id) }}">
            <img src="{{ url_for('static', filename=item.image) }}" alt="{{ item.name }}">
          </a>
        </div>
        {% endfor %}
      </div>
    </section>
  </main>

  <div id="item-overlay" class="item-overlay" style="display:none;">
    <img id="overlay-img" src="" alt="">
    <div class="overlay-info">
      <h3 id="overlay-name"></h3>
      <p id="overlay-desc"></p>
      <p><strong>Price:</strong> £<span id="overlay-price"></span></p>
      <p><strong>By:</strong> <span id="overlay-author"></span></p>
      <a id="overlay-link" href="#" class="overlay-btn">View Product</a>
    </div>
  </div>

  <script src="{{ url_for('static', filename='index.js') }}"></script>
  <script src="{{ url_for('static', filename='search.js') }}"></script>
</body>
</html>
