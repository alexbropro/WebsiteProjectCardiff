<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manga Products</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='manga.css') }}">
</head>
<script src="{{ url_for('static', filename='basket.js') }}"></script>
<body>
  <header class="hero">
    <div class="container">
      <h1>Manga Catalog</h1>
      <p>Browse the latest releases and pre-order favorites.</p>
    </div>
  </header>
  <nav class="main-nav">
    <div class="nav-container">
      <ul class="nav-links">
        <li><a href="{{ url_for('index') }}">Home</a></li>
        <li><a href="{{ url_for('manga') }}">Manga</a></li>

      </ul>
      <div class="search-form">
        <input type="search" id="search-input" name="q" placeholder="Search the site..." aria-label="Search" autocomplete="off">
        <button type="button">Search</button>
        <div class="search-dropdown" id="search-dropdown"></div>
      </div>
      <a href="{{ url_for('basket') }}" class="basket-link">
        <img src="{{ url_for('static', filename='baslet.png') }}" alt="Basket" class="basket-icon">
      </a>
    </div>
  </nav>

  <main class="container">
    <section class="product-listing">
      <h2>Available Manga</h2>
      <div class="sort-bar">
      <span>Sort by:</span>
      <a href="{{ url_for('manga', sort='name') }}" class="sort-btn {% if sort == 'name' %}active{% endif %}">Name</a>
      <a href="{{ url_for('manga', sort='price') }}" class="sort-btn {% if sort == 'price' %}active{% endif %}">Price</a>
      </div>
      <div class="product-grid">
        {% for item in items %}
<article class="product-card">
  <a href="{{ url_for('product', id=item.id) }}">
    <div class="product-image-wrap">
      <img src="{{ url_for('static', filename=item.image) }}" alt="{{ item.name }}">
      <span class="product-badge">Pre-Order</span>
      <span class="product-label">Manga</span>
    </div>
  </a>
  <div class="product-info">
    <h3>{{ item.name }}</h3>
    <div class="price-row">
      <span class="price">£{{ item.price }}</span>
    </div>
    <ul class="product-meta">
      <li><strong>By:</strong> {{ item.author }}</li>
      <li><strong>Eco:</strong> {{ item.eco_impact }}</li>
    </ul>
    <button class="product-button add-to-basket" data-id="{{ item.id }}">Add to Basket</button>
  </div>
</article>
        {% endfor %}
      </div>
    </section>
  </main>
  <script src="{{ url_for('static', filename='manga.js') }}"></script>
  <script src="{{ url_for('static', filename='search.js') }}"></script>
</body>
</html>
